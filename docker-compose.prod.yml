# Production stack для VPS Timeweb Cloud.
# Запуск:
#   docker login ghcr.io
#   docker compose -f docker-compose.prod.yml --env-file .env.prod pull
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# Файл .env.prod создаётся на VPS из шаблона .env.prod.example.

services:
  db:
    image: postgres:16-alpine
    container_name: izhs_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: izhs_redis
    restart: unless-stopped
    volumes:
      - redisdata:/data

  backend:
    image: ${BACKEND_IMAGE:-izhs-backend:local}
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: izhs_backend
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - mediadata:/app/media
      - staticdata:/app/staticfiles
    expose:
      - "8000"

  frontend:
    image: ${FRONTEND_IMAGE:-izhs-frontend:local}
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://remstroy70.ru}
    container_name: izhs_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://remstroy70.ru}
      NODE_ENV: production
    depends_on:
      - backend
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: izhs_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - staticdata:/var/www/static:ro
      - mediadata:/var/www/media:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-conf:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend

  # Получение/обновление SSL-сертификата Let's Encrypt.
  # Первый запуск — вручную (см. infra/README.md), потом auto-renew по таймеру.
  certbot:
    image: certbot/certbot:latest
    container_name: izhs_certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    entrypoint: /bin/sh -c
    command: 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'

volumes:
  pgdata:
  redisdata:
  mediadata:
  staticdata:
  certbot-www:
  certbot-conf:
