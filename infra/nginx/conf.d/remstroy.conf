upstream backend  { server backend:8000;  }
upstream frontend { server frontend:3000; }

# ---------- HTTP: ACME-challenge + редирект на HTTPS ----------
server {
    listen 80;
    listen [::]:80;
    server_name remstroy70.ru www.remstroy70.ru;

    # Let's Encrypt http-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://remstroy70.ru$request_uri;
    }
}

# ---------- HTTPS: www → не-www ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.remstroy70.ru;

    ssl_certificate     /etc/letsencrypt/live/remstroy70.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/remstroy70.ru/privkey.pem;

    return 301 https://remstroy70.ru$request_uri;
}

# ---------- HTTPS: основной сервер ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name remstroy70.ru;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/remstroy70.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/remstroy70.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    # Static (Django collectstatic) — кэш на год, immutable
    location /static/ {
        alias /var/www/static/;
        access_log off;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Media (Django uploads, если не S3) — кэш 30 дней
    location /media/ {
        alias /var/www/media/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Backend: API + admin + sitemap из Django (если будет нужен) + DRF schema
    location ~ ^/(api|admin|api-auth)/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
        proxy_read_timeout 60s;
    }

    # Next.js: всё остальное (главная, /builds, /settlement, _next/, sitemap.xml, robots.txt и т.д.)
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_redirect off;
        proxy_read_timeout 60s;
    }

    # Кэш бандла Next.js
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        access_log off;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}
